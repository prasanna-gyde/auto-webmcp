  </g>
  <g fill="#fff" text-anchor="middle" font-family="DejaVu Sans,Verdana,Geneva,sans-serif" font-size="110">
    <text aria-hidden="true" x="425" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="730" lengthAdjust="spacing">AI-agent</text>
    <text x="425" y="140" transform="scale(.1)" textLength="730" lengthAdjust="spacing">AI-agent</text>
    <text aria-hidden="true" x="1145" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="550" lengthAdjust="spacing">ready</text>
