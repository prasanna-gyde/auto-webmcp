<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>React Remount Test</title>
</head>
<body>
  <h2>Profile Form</h2>
  <form
    id="test-form"
    data-webmcp-name="save_profile"
    data-webmcp-description="Save user profile information"
  >
    <label for="username">Username</label>
    <input id="username" type="text">

    <label for="bio">Bio</label>
    <textarea id="bio"></textarea>

    <button type="submit">Save Profile</button>
  </form>

  <script>
    // Simulate a framework remount: 80ms after page load, replace the form's
    // inner HTML with a fresh copy. This blanks all field values, just like
    // React running a reconciliation cycle after a state update.
    setTimeout(function() {
      var form = document.getElementById('test-form');
      if (!form) return;
      form.innerHTML = form.innerHTML;
      window.__remountDone = true;
    }, 80);
  </script>

  <script type="module" src="../../dist/auto-webmcp.esm.js"></script>
</body>
</html>
