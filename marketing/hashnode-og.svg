<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="topbar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="bggrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#13151f"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff07" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bggrad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#topbar)"/>

  <!-- Blog name badge -->
  <rect x="450" y="80" width="300" height="40" rx="20" fill="#6366f118" stroke="#6366f150" stroke-width="1"/>
  <text x="600" y="106" font-family="ui-monospace, monospace" font-size="17" fill="#a5b4fc" text-anchor="middle">prasannabuilds.hashnode.dev</text>

  <!-- Main title -->
  <text x="600" y="230" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="52" font-weight="700" fill="#ffffff" text-anchor="middle">Every web form should be</text>
  <text x="600" y="295" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="52" font-weight="700" fill="#ffffff" text-anchor="middle">callable by AI agents</text>

  <!-- Tagline -->
  <text x="600" y="355" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="24" fill="#94a3b8" text-anchor="middle">And yours can be today, with auto-webmcp</text>

  <!-- Divider -->
  <rect x="500" y="390" width="200" height="2" rx="1" fill="#6366f130"/>

  <!-- Tags -->
  <rect x="218" y="415" width="140" height="38" rx="19" fill="#1e2130" stroke="#6366f140" stroke-width="1"/>
  <text x="288" y="439" font-family="ui-monospace, monospace" font-size="15" fill="#a5b4fc" text-anchor="middle">#webmcp</text>

  <rect x="373" y="415" width="140" height="38" rx="19" fill="#1e2130" stroke="#8b5cf640" stroke-width="1"/>
  <text x="443" y="439" font-family="ui-monospace, monospace" font-size="15" fill="#c4b5fd" text-anchor="middle">#javascript</text>

  <rect x="528" y="415" width="100" height="38" rx="19" fill="#1e2130" stroke="#06b6d440" stroke-width="1"/>
  <text x="578" y="439" font-family="ui-monospace, monospace" font-size="15" fill="#67e8f9" text-anchor="middle">#ai</text>

  <rect x="643" y="415" width="160" height="38" rx="19" fill="#1e2130" stroke="#6366f140" stroke-width="1"/>
  <text x="723" y="439" font-family="ui-monospace, monospace" font-size="15" fill="#a5b4fc" text-anchor="middle">#opensource</text>

  <rect x="818" y="415" width="164" height="38" rx="19" fill="#1e2130" stroke="#8b5cf640" stroke-width="1"/>
  <text x="900" y="439" font-family="ui-monospace, monospace" font-size="15" fill="#c4b5fd" text-anchor="middle">#chromeapi</text>

  <!-- Bottom -->
  <text x="600" y="570" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="20" fill="#475569" text-anchor="middle">autowebmcp.dev · MIT · open source</text>
</svg>
