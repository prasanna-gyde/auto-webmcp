<svg xmlns="http://www.w3.org/2000/svg" width="772" height="250" viewBox="0 0 772 250">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e5fe96" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#e5fe96" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="772" height="250" fill="url(#bg)"/>

  <!-- Subtle top glow strip -->
  <rect width="772" height="120" fill="url(#glow)"/>

  <!-- Grid dots pattern (right side decoration) -->
  <g opacity="0.07" fill="#e5fe96">
    <circle cx="520" cy="40" r="2"/><circle cx="550" cy="40" r="2"/><circle cx="580" cy="40" r="2"/><circle cx="610" cy="40" r="2"/><circle cx="640" cy="40" r="2"/><circle cx="670" cy="40" r="2"/><circle cx="700" cy="40" r="2"/><circle cx="730" cy="40" r="2"/>
    <circle cx="520" cy="70" r="2"/><circle cx="550" cy="70" r="2"/><circle cx="580" cy="70" r="2"/><circle cx="610" cy="70" r="2"/><circle cx="640" cy="70" r="2"/><circle cx="670" cy="70" r="2"/><circle cx="700" cy="70" r="2"/><circle cx="730" cy="70" r="2"/>
    <circle cx="520" cy="100" r="2"/><circle cx="550" cy="100" r="2"/><circle cx="580" cy="100" r="2"/><circle cx="610" cy="100" r="2"/><circle cx="640" cy="100" r="2"/><circle cx="670" cy="100" r="2"/><circle cx="700" cy="100" r="2"/><circle cx="730" cy="100" r="2"/>
    <circle cx="520" cy="130" r="2"/><circle cx="550" cy="130" r="2"/><circle cx="580" cy="130" r="2"/><circle cx="610" cy="130" r="2"/><circle cx="640" cy="130" r="2"/><circle cx="670" cy="130" r="2"/><circle cx="700" cy="130" r="2"/><circle cx="730" cy="130" r="2"/>
    <circle cx="520" cy="160" r="2"/><circle cx="550" cy="160" r="2"/><circle cx="580" cy="160" r="2"/><circle cx="610" cy="160" r="2"/><circle cx="640" cy="160" r="2"/><circle cx="670" cy="160" r="2"/><circle cx="700" cy="160" r="2"/><circle cx="730" cy="160" r="2"/>
    <circle cx="520" cy="190" r="2"/><circle cx="550" cy="190" r="2"/><circle cx="580" cy="190" r="2"/><circle cx="610" cy="190" r="2"/><circle cx="640" cy="190" r="2"/><circle cx="670" cy="190" r="2"/><circle cx="700" cy="190" r="2"/><circle cx="730" cy="190" r="2"/>
    <circle cx="520" cy="220" r="2"/><circle cx="550" cy="220" r="2"/><circle cx="580" cy="220" r="2"/><circle cx="610" cy="220" r="2"/><circle cx="640" cy="220" r="2"/><circle cx="670" cy="220" r="2"/><circle cx="700" cy="220" r="2"/><circle cx="730" cy="220" r="2"/>
  </g>

  <!-- Lightning bolt icon -->
  <path d="M82 58 L54 122 H76 L64 192 L102 116 H80 Z" fill="#e5fe96"/>

  <!-- Main title -->
  <text x="118" y="120"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-weight="700"
        font-size="52"
        letter-spacing="-1"
        fill="#ffffff">auto-webmcp</text>

  <!-- Subtitle -->
  <text x="120" y="158"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-weight="400"
        font-size="18"
        fill="#9ca3af"
        letter-spacing="0.2">Every form instantly callable by AI agents</text>

  <!-- Badge -->
  <rect x="120" y="175" width="130" height="26" rx="13" fill="#e5fe96" fill-opacity="0.12" stroke="#e5fe96" stroke-opacity="0.3" stroke-width="1"/>
  <text x="185" y="192"
        text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-weight="600"
        font-size="12"
        fill="#e5fe96">Zero configuration</text>

  <!-- WordPress logo area (bottom right) -->
  <text x="720" y="232"
        text-anchor="end"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-weight="400"
        font-size="12"
        fill="#4b5563">autowebmcp.dev</text>
</svg>
